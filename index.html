<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Silambam &amp; Karate Club</title>
<meta name="description" content="VM Silambam & Karate Club — heritage martial arts training, tournaments, and events.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --maroon-dark:#3c0b12;
  --maroon:#6b1420;
  --maroon-mid:#7d1a26;
  --maroon-light:#9a2635;
  --gold:#c89b3c;
  --gold-light:#e8cd82;
  --gold-dim:#8a6d2e;
  --ivory:#f6efdd;
  --ivory-dark:#ece0c4;
  --ink:#211510;
  --ink-soft:#4a3a30;
  --teal:#20453a;
  --sienna:#a85c2a;
  --danger:#8c2c2c;
  --success:#2c6b3f;
  --font-display:'Cinzel',serif;
  --font-deco:'Cinzel Decorative',serif;
  --font-body:'EB Garamond',serif;
  --font-ui:'Poppins',sans-serif;
  --radius:6px;
  --shadow-lift:0 18px 40px -18px rgba(35,10,10,.45);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--ivory);color:var(--ink);font-family:var(--font-body);font-size:18px;line-height:1.6}
h1,h2,h3,h4{font-family:var(--font-display);color:var(--maroon-dark);margin:0 0 .4em;letter-spacing:.02em;font-weight:600}
h1{font-size:clamp(2.1rem,4vw,3.4rem)}
h2{font-size:clamp(1.6rem,3vw,2.3rem)}
h3{font-size:1.3rem}
p{margin:0 0 1em}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font-family:var(--font-ui);cursor:pointer}
.eyebrow{font-family:var(--font-ui);letter-spacing:.28em;text-transform:uppercase;font-size:.72rem;color:var(--gold-dim);font-weight:600}
.container{max-width:1180px;margin:0 auto;padding:0 28px}
.narrow{max-width:820px}

/* ---- ornamental divider (kolam-inspired) ---- */
.ornament-divider{display:flex;align-items:center;gap:14px;margin:2.2em 0;justify-content:center}
.ornament-divider::before,.ornament-divider::after{content:'';flex:1;max-width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ornament-divider svg{width:26px;height:26px;flex-shrink:0}

/* ---- top nav ---- */
.topbar{background:var(--maroon-dark);color:var(--gold-light);font-family:var(--font-ui);font-size:.78rem;letter-spacing:.04em}
.topbar .container{display:flex;justify-content:space-between;align-items:center;padding:6px 28px;flex-wrap:wrap;gap:6px}
.topbar a{opacity:.9}
.topbar a:hover{color:var(--gold)}
nav.mainnav{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,var(--maroon) 0%,var(--maroon-mid) 100%);border-bottom:3px solid var(--gold);box-shadow:var(--shadow-lift)}
nav.mainnav .container{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;gap:18px}
.brand{display:flex;align-items:center;gap:12px;color:var(--ivory)}
.brand img{width:46px;height:46px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;background:var(--ivory)}
.brand .brand-name{font-family:var(--font-display);font-weight:700;font-size:1.05rem;line-height:1.15;color:var(--gold-light)}
.brand .brand-sub{font-family:var(--font-ui);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ivory-dark)}
.navlinks{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
.navlinks a{font-family:var(--font-ui);font-size:.83rem;font-weight:500;color:var(--ivory-dark);padding:10px 12px;border-radius:4px;position:relative;letter-spacing:.02em}
.navlinks a:hover,.navlinks a.active{color:var(--gold-light)}
.navlinks a.active::after{content:'';position:absolute;left:12px;right:12px;bottom:4px;height:2px;background:var(--gold)}
.navlinks .join-btn{background:var(--gold);color:var(--maroon-dark)!important;border-radius:30px;padding:9px 18px;font-weight:700}
.navlinks .join-btn:hover{background:var(--gold-light)}
.navtoggle{display:none;background:none;border:1px solid var(--gold-dim);color:var(--gold-light);padding:8px 10px;border-radius:4px}
@media(max-width:920px){
  .navtoggle{display:block}
  .navlinks{display:none;position:absolute;top:100%;left:0;right:0;background:var(--maroon-dark);flex-direction:column;padding:10px;border-bottom:3px solid var(--gold)}
  .navlinks.open{display:flex}
  nav.mainnav{position:relative}
  .navlinks a{padding:12px 14px;width:100%}
}

/* ---- hero ---- */
.hero{position:relative;overflow:hidden;background:radial-gradient(ellipse at top,#5a1019 0%,var(--maroon-dark) 55%,#20080c 100%);color:var(--ivory);padding:100px 28px 90px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,var(--gold) 1px,transparent 1.4px);background-size:34px 34px;opacity:.08;pointer-events:none}
.hero-frame{position:absolute;inset:14px;border:1px solid var(--gold-dim);pointer-events:none;opacity:.5}
.hero .eyebrow{color:var(--gold-light)}
.hero h1{color:var(--ivory);text-shadow:0 4px 30px rgba(0,0,0,.4)}
.hero p.lead{max-width:640px;margin:0 auto 1.6em;color:var(--ivory-dark);font-size:1.15rem;font-style:italic}
.hero-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.emblem{width:120px;height:120px;margin:0 auto 22px;position:relative}
.emblem svg{width:100%;height:100%;animation:spin-slow 40s linear infinite}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.emblem svg{animation:none}}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:30px;font-weight:600;font-size:.92rem;border:1px solid transparent;transition:transform .15s ease,box-shadow .15s ease;letter-spacing:.02em}
.btn:hover{transform:translateY(-2px)}
.btn-gold{background:linear-gradient(180deg,var(--gold-light),var(--gold));color:var(--maroon-dark);box-shadow:0 10px 26px -10px rgba(200,155,60,.7)}
.btn-outline{border-color:var(--gold);color:var(--ivory)}
.btn-outline:hover{background:rgba(200,155,60,.12)}
.btn-maroon{background:var(--maroon);color:var(--ivory)}
.btn-maroon:hover{background:var(--maroon-light)}
.btn-sm{padding:8px 16px;font-size:.8rem;border-radius:20px}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--ink-soft);color:var(--ink)}
.btn[disabled]{opacity:.5;pointer-events:none}

/* ---- sections ---- */
.section{padding:76px 0}
.section.alt{background:var(--ivory-dark)}
.section.dark{background:var(--maroon-dark);color:var(--ivory)}
.section.dark h2{color:var(--gold-light)}
.section-head{text-align:center;max-width:640px;margin:0 auto 46px}

/* ---- cards ---- */
.grid{display:grid;gap:26px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:960px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.grid-3,.grid-4,.grid-2{grid-template-columns:1fr}}

.card{background:#fff;border:1px solid var(--ivory-dark);border-radius:var(--radius);overflow:hidden;box-shadow:0 10px 30px -18px rgba(35,10,10,.25);transition:transform .2s ease,box-shadow .2s ease;position:relative}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px -18px rgba(35,10,10,.35)}
.card .card-img{height:190px;background:#ddd center/cover no-repeat;position:relative}
.card .card-body{padding:20px 22px}
.card .card-body h3{margin-bottom:6px}
.card .tag{display:inline-block;font-family:var(--font-ui);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--maroon);color:var(--gold-light);padding:4px 10px;border-radius:20px;margin-bottom:10px}
.card .tag.open{background:var(--success)}
.card .tag.closed{background:var(--danger)}
.card .tag.gold{background:var(--gold);color:var(--maroon-dark)}
.card .meta{font-family:var(--font-ui);font-size:.8rem;color:var(--ink-soft);display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}

.coach-card{text-align:center}
.coach-card .card-img{height:230px;border-radius:50%;width:180px;margin:26px auto 0;border:3px solid var(--gold)}
.coach-card .card-body{padding-top:14px}
.coach-card .rank{color:var(--sienna);font-family:var(--font-ui);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* stat strip */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat h3{font-family:var(--font-deco);font-size:2.4rem;color:var(--gold-light);margin-bottom:2px}
.stat span{font-family:var(--font-ui);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ivory-dark)}


/* footer */
footer{background:var(--maroon-dark);color:var(--ivory-dark);padding:56px 0 20px;font-family:var(--font-ui);font-size:.9rem}
footer h4{color:var(--gold-light);font-family:var(--font-display);font-size:1rem;margin-bottom:14px}
footer a:hover{color:var(--gold-light)}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px}
@media(max-width:760px){.footer-grid{grid-template-columns:1fr 1fr}}
footer .bottom{margin-top:40px;padding-top:20px;border-top:1px solid rgba(200,155,60,.25);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:.78rem;color:var(--ivory-dark)}
footer ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}

/* forms (public + admin shared) */
.form-field{margin-bottom:18px}
.form-field label{display:block;font-family:var(--font-ui);font-weight:600;font-size:.85rem;margin-bottom:6px;color:var(--maroon-dark)}
.form-field .hint{font-size:.78rem;color:var(--ink-soft);margin-top:4px}
.form-field input[type=text],.form-field input[type=email],.form-field input[type=tel],.form-field input[type=number],.form-field input[type=date],.form-field input[type=time],.form-field select,.form-field textarea{
  width:100%;padding:11px 13px;border:1px solid #c9bfa4;border-radius:4px;font-family:var(--font-body);font-size:1rem;background:#fffdf8}
.form-field textarea{min-height:100px;resize:vertical}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
.form-field .req{color:var(--danger)}
.radio-row,.checkbox-row{display:flex;gap:10px;align-items:center;margin-bottom:6px;font-family:var(--font-ui);font-size:.92rem}
.form-card{background:#fff;border:1px solid var(--ivory-dark);border-radius:8px;padding:32px;box-shadow:var(--shadow-lift)}
.rating-row{display:flex;gap:8px}
.rating-row button{width:38px;height:38px;border-radius:50%;border:1px solid var(--gold-dim);background:#fff;font-family:var(--font-ui)}
.rating-row button.sel{background:var(--gold);color:#fff;border-color:var(--gold)}
.yn-row{display:flex;gap:10px}
.yn-row button{flex:1;padding:10px;border:1px solid var(--gold-dim);background:#fff;border-radius:4px}
.yn-row button.sel{background:var(--maroon);color:#fff}

/* admin layout */
.admin-shell{display:flex;min-height:calc(100vh - 0px)}
.admin-sidebar{width:230px;background:var(--maroon-dark);color:var(--ivory-dark);flex-shrink:0;padding:18px 0}
.admin-sidebar .a-brand{padding:0 20px 18px;border-bottom:1px solid rgba(200,155,60,.25);margin-bottom:10px;font-family:var(--font-display);color:var(--gold-light)}
.admin-sidebar a{display:block;padding:11px 20px;font-family:var(--font-ui);font-size:.85rem;color:var(--ivory-dark);border-left:3px solid transparent}
.admin-sidebar a:hover{background:rgba(255,255,255,.05)}
.admin-sidebar a.active{border-left-color:var(--gold);color:var(--gold-light);background:rgba(255,255,255,.06)}
.admin-main{flex:1;padding:32px;background:var(--ivory-dark);min-height:100vh}
.admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.panel{background:#fff;border:1px solid #ddd0ac;border-radius:8px;padding:24px;margin-bottom:22px}
.panel h3{margin-top:0}
table.admin-table{width:100%;border-collapse:collapse;font-family:var(--font-ui);font-size:.88rem}
table.admin-table th{text-align:left;background:var(--ivory-dark);padding:10px 12px;border-bottom:2px solid var(--gold-dim);font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
table.admin-table td{padding:10px 12px;border-bottom:1px solid #eee2c4;vertical-align:middle}
table.admin-table tr:hover{background:#fbf6e8}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge.open{background:#dcefe0;color:var(--success)}
.badge.closed{background:#f4dcdc;color:var(--danger)}
.badge.draft{background:#eee;color:#666}
.badge.published{background:#dcefe0;color:var(--success)}
.row-actions{display:flex;gap:8px}
.row-actions button{background:none;border:1px solid #ccc;border-radius:4px;padding:4px 9px;font-size:.78rem}
.row-actions button:hover{background:#f2f2f2}
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
@media(max-width:900px){.stat-cards{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:1px solid #ddd0ac;border-left:5px solid var(--gold);border-radius:8px;padding:18px 20px}
.stat-card h4{font-family:var(--font-ui);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0}
.stat-card .num{font-family:var(--font-display);font-size:2rem;color:var(--maroon)}

/* form builder */
.fb-shell{display:grid;grid-template-columns:220px 1fr 300px;gap:18px}
@media(max-width:1100px){.fb-shell{grid-template-columns:1fr}}
.fb-palette button{width:100%;text-align:left;padding:10px 12px;margin-bottom:8px;border:1px solid #ddd0ac;background:#fff;border-radius:6px;font-size:.85rem;font-family:var(--font-ui)}
.fb-palette button:hover{border-color:var(--gold)}
.fb-canvas .fb-field{background:#fff;border:1px solid #ddd0ac;border-radius:6px;padding:14px 16px;margin-bottom:12px;cursor:pointer;position:relative}
.fb-canvas .fb-field.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.2)}
.fb-canvas .fb-field .fb-field-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.fb-canvas .fb-field .fb-type{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-dim);font-family:var(--font-ui)}
.fb-canvas .fb-field .fb-ctrls{display:flex;gap:4px}
.fb-canvas .fb-field .fb-ctrls button{background:none;border:none;font-size:.9rem;padding:2px 5px;color:var(--ink-soft)}
.fb-canvas .fb-field .fb-ctrls button:hover{color:var(--maroon)}
.fb-props{background:#fff;border:1px solid #ddd0ac;border-radius:6px;padding:16px}
.fb-props .form-field{margin-bottom:14px}
.fb-empty{text-align:center;color:var(--ink-soft);padding:60px 20px;border:2px dashed #ddd0ac;border-radius:8px;font-family:var(--font-ui)}

/* modal & toast */
#modal-root .overlay{position:fixed;inset:0;background:rgba(20,8,8,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
#modal-root .modal-box{background:#fffdf8;border-radius:8px;max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:28px;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
#modal-root .modal-box h3{margin-top:0}
#toast-container{position:fixed;top:18px;right:18px;z-index:400;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--maroon-dark);color:var(--ivory);padding:13px 20px;border-radius:6px;border-left:4px solid var(--gold);font-family:var(--font-ui);font-size:.88rem;box-shadow:var(--shadow-lift);max-width:320px}
.toast.error{border-left-color:var(--danger)}
.toast.success{border-left-color:var(--success)}

.loader-wrap{display:flex;align-items:center;justify-content:center;padding:80px 0;color:var(--ink-soft);font-family:var(--font-ui)}
.spinner{width:34px;height:34px;border:3px solid var(--ivory-dark);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin-right:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);font-family:var(--font-ui)}

.breadcrumb{font-family:var(--font-ui);font-size:.8rem;color:var(--ink-soft);margin-bottom:18px}
.breadcrumb a:hover{color:var(--maroon)}
.detail-banner{height:320px;background:#333 center/cover no-repeat;position:relative}
.detail-banner .overlay-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(20,8,8,.85),transparent 60%)}
.detail-banner .banner-text{position:absolute;bottom:24px;left:0;right:0;color:#fff}
.progress-badge{font-family:var(--font-ui);font-weight:600;font-size:.75rem;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.split{display:grid;grid-template-columns:1.6fr 1fr;gap:34px}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.file-drop{border:2px dashed var(--gold-dim);border-radius:8px;padding:24px;text-align:center;font-family:var(--font-ui);color:var(--ink-soft);cursor:pointer}
.file-drop:hover{border-color:var(--gold)}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.thumb-grid .thumb{position:relative;border-radius:4px;overflow:hidden;border:1px solid #ddd0ac;aspect-ratio:1}
.thumb-grid .thumb img{width:100%;height:100%;object-fit:cover}
.thumb-grid .thumb .del{position:absolute;top:4px;right:4px;background:rgba(140,44,44,.9);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.8rem}
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#5a1019,var(--maroon-dark))}
.login-card{background:#fffdf8;padding:40px;border-radius:10px;max-width:380px;width:100%;box-shadow:var(--shadow-lift)}
</style>
</head>

<div id="toast-container"></div>
<div id="modal-root"></div>
<div id="app"><div class="loader-wrap"><div class="spinner"></div>Loading VM Silambam &amp; Karate Club...</div></div>

<script>
/* =========================================================================
   UTILITIES
   ========================================================================= */
const $ = (sel,root=document)=>root.querySelector(sel);
const $$ = (sel,root=document)=>[...root.querySelectorAll(sel)];
function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmtDate(v){
  if(!v) return '';
  let d = v.toDate ? v.toDate() : new Date(v);
  if(isNaN(d.getTime())) return v;
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function toast(msg,type='info'){
  const c = $('#toast-container');
  const t = document.createElement('div');
  t.className = 'toast'+(type==='error'?' error':type==='success'?' success':'');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); },3400);
}
function openModal(innerHtml){
  const root = $('#modal-root');
  root.innerHTML = `<div class="overlay" data-close><div class="modal-box">${innerHtml}</div></div>`;
  root.querySelector('.overlay').addEventListener('click',e=>{ if(e.target.hasAttribute('data-close')) closeModal(); });
}
function closeModal(){ $('#modal-root').innerHTML=''; }
function confirmAction(message,onYes){
  openModal(`
    <h3>Please confirm</h3>
    <p>${escapeHtml(message)}</p>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-ghost btn-sm" data-close>Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-yes-btn">Yes, proceed</button>
    </div>`);
  $('#confirm-yes-btn').addEventListener('click',()=>{ closeModal(); onYes(); });
}
function loaderHtml(msg='Loading...'){ return `<div class="loader-wrap"><div class="spinner"></div>${escapeHtml(msg)}</div>`; }
function emptyState(msg){ return `<div class="empty-state">${escapeHtml(msg)}</div>`; }

/* File upload -> Cloudinary (free, no billing account needed) -> returns hosted image URL */
async function uploadFile(file, folder){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', folder); // organizes uploads inside your Cloudinary media library
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, {
    method: 'POST', body: fd
  });
  const data = await res.json();
  if(!res.ok || !data.secure_url){
    throw new Error(data.error?.message || 'Image upload failed. Check your Cloudinary cloud name / upload preset.');
  }
  return data.secure_url;
}
async function deleteFileByUrl(url){
  // Deleting from Cloudinary requires a signed request (API secret), which can't
  // be done safely from browser code. We simply drop the reference in Firestore;
  // the file itself stays in your Cloudinary library (well within the free quota
  // for a club site) and can be cleaned up manually from the Cloudinary dashboard
  // if you ever want to.
  return;
}

/* =========================================================================
   GLOBAL STATE
   ========================================================================= */
const state = {
  user: null,
  isAdmin: false,
  site: { clubName:'VM Silambam & Karate Club', tagline:'Heritage in Motion. Discipline for Life.',
    logoUrl:'', heroImage:'', studentsTrainedManual:0,
    about:{history:'',mission:'',vision:'',founder:'',chiefInstructor:''},
    contact:{address:'',phone:'',email:'',mapEmbed:'',whatsapp:'',facebook:'',instagram:'',youtube:''} },
  cache: {}
};

/* =========================================================================
   FIRESTORE DATA HELPERS
   ========================================================================= */
function col(name){ return db.collection(name); }

async function fetchAll(name, {orderField=null, orderDir='asc'}={}){
  let ref = col(name);
  if(orderField) ref = ref.orderBy(orderField, orderDir);
  const snap = await ref.get();
  return snap.docs.map(d=>({id:d.id, ...d.data()}));
}
async function fetchOne(name,id){
  const d = await col(name).doc(id).get();
  return d.exists ? {id:d.id, ...d.data()} : null;
}
async function addItem(name,data){
  const ref = await col(name).add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
  return ref.id;
}
async function updateItem(name,id,data){
  await col(name).doc(id).update({...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
}
async function setItem(name,id,data){
  await col(name).doc(id).set({...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
}
async function deleteItem(name,id){
  await col(name).doc(id).delete();
}
async function loadSiteConfig(){
  try{
    const d = await db.collection('config').doc('site').get();
    if(d.exists){ state.site = {...state.site, ...d.data()}; }
  }catch(e){ console.warn('Could not load site config (check Firestore rules / connection):', e.message); }
}
async function saveSiteConfig(patch){
  state.site = {...state.site, ...patch};
  await db.collection('config').doc('site').set(state.site,{merge:true});
}
</script>
<script>
/* =========================================================================
   ROUTER
   ========================================================================= */
const PUBLIC_NAV = [
  ['#/home','Home'],['#/about','About'],['#/coaches','Coaches'],['#/branches','Branches'],
  ['#/courses','Courses'],['#/achievements','Achievements'],
  ['#/events','Events'],['#/tournaments','Tournaments'],['#/contact','Contact']
];

function currentHash(){ return location.hash || '#/home'; }

function parseHash(){
  const h = currentHash().replace(/^#\//,'');
  const parts = h.split('/').filter(Boolean);
  return { path: parts[0]||'home', param: parts[1]||null, sub: parts[2]||null, rest: parts.slice(2).join('/') || null };
}

async function route(){
  const { path, param, rest } = parseHash();
  const app = $('#app');

  if(path === 'admin'){
    await renderAdminShell(param, rest);
    return;
  }

  // public layout
  app.innerHTML = `
    <div class="topbar"><div class="container">
      <div>${escapeHtml(state.site.contact?.phone||'')} ${state.site.contact?.phone && state.site.contact?.email ? ' &nbsp;|&nbsp; ' : ''} ${escapeHtml(state.site.contact?.email||'')}</div>
      <div><a href="#/login">${state.isAdmin ? 'Admin Dashboard' : 'Admin Login'}</a></div>
    </div></div>
    <nav class="mainnav"><div class="container">
      <a href="#/home" class="brand">
        <img src="${SITE_LOGO_URL}" alt="logo">
        <div><div class="brand-name">${escapeHtml(state.site.clubName)}</div><div class="brand-sub">Silambam &amp; Karate</div></div>
      </a>
      <button class="navtoggle" id="navtoggle">&#9776; Menu</button>
      <div class="navlinks" id="navlinks">
        ${PUBLIC_NAV.map(([href,label])=>`<a href="${href}" class="${currentHash().startsWith(href)?'active':''}">${label}</a>`).join('')}
        <a href="#/join" class="join-btn">Join Now</a>
      </div>
    </div></nav>
    <main id="page-root">${loaderHtml()}</main>
    ${renderFooter()}
  `;
  $('#navtoggle')?.addEventListener('click',()=>$('#navlinks').classList.toggle('open'));

  const pageRoot = $('#page-root');
  try{
    switch(path){
      case 'home': pageRoot.innerHTML = await renderHome(); break;
      case 'about': pageRoot.innerHTML = await renderAbout(); break;
      case 'coaches': pageRoot.innerHTML = await renderCoaches(); break;
      case 'branches': pageRoot.innerHTML = await renderBranches(); break;
      case 'courses': pageRoot.innerHTML = await renderCourses(); break;
      case 'achievements': pageRoot.innerHTML = await renderAchievements(); break;
      case 'events':
        if(param){ pageRoot.innerHTML = await renderEventDetail(param); attachRegistrationForm('events',param); }
        else pageRoot.innerHTML = await renderEventsList();
        break;
      case 'tournaments':
        if(param){ pageRoot.innerHTML = await renderTournamentDetail(param); attachRegistrationForm('tournaments',param); }
        else pageRoot.innerHTML = await renderTournamentsList();
        break;
      case 'contact': pageRoot.innerHTML = await renderContact(); attachContactForm(); break;
      case 'join': pageRoot.innerHTML = renderJoin(); break;
      case 'login': pageRoot.innerHTML = renderLogin(); attachLoginForm(); break;
      default: pageRoot.innerHTML = emptyState('Page not found.');
    }
  }catch(e){
    console.error(e);
    pageRoot.innerHTML = `<div class="container section">${emptyState('Something went wrong loading this page: '+e.message)}</div>`;
  }
  window.scrollTo({top:0,behavior:'instant'});
}

        <li><a href="#/achievements">Achievements</a></li>

      </ul></div>
      <div><h4>Contact</h4><ul>
        <li>${escapeHtml(s.contact?.address||'Address coming soon')}</li>

        <li>${escapeHtml(s.contact?.email||'')}</li>
      </ul></div>

      <span>&copy; ${new Date().getFullYear()} ${escapeHtml(s.clubName)}. All rights reserved.</span>
      <span>Crafted with discipline &amp; heritage.</span>
    </div>
  </div></footer>`;
}

window.addEventListener('hashchange', route);

<script>
/* =========================================================================
   SAFE FETCH WRAPPER (keeps pages usable even before Firebase project is configured)
   ========================================================================= */
async function safeFetchAll(name, opts){
  try{ return await fetchAll(name, opts); }
  catch(e){ console.warn('fetch '+name+' failed:', e.message); return []; }
}

/* =========================================================================
   PUBLIC PAGE: HOME
   ========================================================================= */
async function renderHome(){
  const [branches, coaches, achievements, events, tournaments] = await Promise.all([

  <section class="hero">
    <div class="hero-frame"></div>

      <div class="emblem">${emblemSvg()}</div>
      <div class="eyebrow">Est. Heritage &middot; Discipline &middot; Honour</div>

        <div class="stat"><h3>${coaches.length}</h3><span>Expert Coaches</span></div>

    </div>
  </section>

  <section class="section">
    <div class="container">

        <div class="eyebrow">What Awaits</div>
        <h2>Upcoming Events &amp; Tournaments</h2>
        <p>Register early — every event has its own online form and confirmation.</p>

function emblemSvg(){
  return `<svg viewBox="0 0 100 100"><g fill="none" stroke="#c89b3c" stroke-width="2.4">
  <circle cx="50" cy="50" r="46"/><circle cx="50" cy="50" r="48"/>
  ${Array.from({length:16}).map((_,i)=>{const a=i*22.5*Math.PI/180;const x1=50+38*Math.cos(a),y1=50+38*Math.sin(a),x2=50+46*Math.cos(a),y2=50+46*Math.sin(a);return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;}).join('')}
  <circle cx="50" cy="50" r="40"/>
  <text x="50" y="57" font-size="12" text-anchor="middle" fill="#e8cd82" stroke="none" font-family="serif">செம்மறம்</text>
  </g></svg>`;
}
function kolamSvg(){
  return `<svg viewBox="0 0 40 40" fill="none" stroke="#c89b3c" stroke-width="1.5"><circle cx="20" cy="20" r="6"/><circle cx="20" cy="20" r="54"/><path d="M20 6 L20 34 M6 20 L34 20"/></svg>`;
}

function branchCard(b){
  return `<div class="card">
    <div class="card-img" style="background-image:url('${b.imageUrl||placeholderImg()}')"></div>
    <div class="card-body">
      <span class="tag ${b.status==='closed'?'closed':'open'}">${b.status==='closed'?'Temporarily Closed':'Open'}</span>
      <h3>${escapeHtml(b.name)}</h3>
      <p>${escapeHtml(b.address||'')}</p>
      <div class="meta"><span>&#9742; ${escapeHtml(b.phone||'-')}</span><span>Instructor: ${escapeHtml(b.instructor||'-')}</span></div>
      <div class="meta"><span>${escapeHtml(b.timing||'')}</span></div>
    </div>
  </div>`;
}
function placeholderImg(){
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260"><rect width="400" height="260" fill="#ece0c4"/><g transform="translate(200,130)" fill="none" stroke="#c89b3c" stroke-width="1.6" opacity="0.55"><circle r="46"/><circle r="38"/><path d="M0 -46 L0 -38 M0 38 L0 46 M-46 0 L-38 0 M38 0 L46 0"/><path d="M-32.5 -32.5 L-26.8 -26.8 M26.8 26.8 L32.5 32.5 M-32.5 32.5 L-26.8 26.8 M26.8 -26.8 L32.5 -32.5"/></g></svg>`);
}
function achievementCard(a){
  return `<div class="card">
    <div class="card-img" style="background-image:url('${a.photoUrl||placeholderImg()}')"></div>
    <div class="card-body">
      <span class="tag gold">${escapeHtml((a.medal||'').toUpperCase())} &middot; ${escapeHtml(a.level||'')}</span>
      <h3>${escapeHtml(a.studentName)}</h3>
      <p>${escapeHtml(a.title)}</p>
      <div class="meta"><span>${escapeHtml(a.year||'')}</span></div>
    </div>
  </div>`;
}
function eventCard(e){
  const isTournament = e.hasOwnProperty('ageGroup') || e.hasOwnProperty('medalTally');
  const link = isTournament ? `#/tournaments/${e.id}` : `#/events/${e.id}`;
  return `<a href="${link}" class="card" style="display:block">
    <div class="card-img" style="background-image:url('${e.bannerUrl||placeholderImg()}')"></div>
    <div class="card-body">

      <div class="meta"><span>&#128197; ${fmtDate(e.date)}</span><span>&#128205; ${escapeHtml(e.venue||'TBA')}</span></div>
    </div>
  </a>`;
}
</script>

function attachContactForm(){
  const f = $('#contact-form'); if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const data = Object.fromEntries(new FormData(f).entries());
    try{
      await addItem('contactMessages', data);
      toast('Message sent! We will get back to you shortly.','success');
      f.reset();
    }catch(err){ toast('Could not send message: '+err.message,'error'); }
  });
}

<script>
/* =========================================================================
   DYNAMIC FORM ENGINE (renders Google-Forms-style schemas built by admin)
   Shared between public registration pages and the admin form-builder preview.
   ========================================================================= */
const FIELD_TYPES = [
  {type:'short_text', label:'Short Answer'},
  {type:'long_text', label:'Long Answer'},
  {type:'email', label:'Email'},
  {type:'phone', label:'Phone Number'},
  {type:'number', label:'Number'},
  {type:'date', label:'Date'},
  {type:'time', label:'Time'},
  {type:'dropdown', label:'Dropdown'},
  {type:'radio', label:'Multiple Choice'},
  {type:'checkbox', label:'Checkboxes'},
  {type:'yesno', label:'Yes / No'},
  {type:'rating', label:'Rating'},
  {type:'file', label:'File / Image Upload'},
  {type:'heading', label:'Section Heading'},
  {type:'description', label:'Paragraph Text'},
  {type:'divider', label:'Divider'}
];
function defaultFieldForType(type){
  const base = {id:uid(), type, label: FIELD_TYPES.find(t=>t.type===type)?.label || 'Field', required:false, help:'', placeholder:''};
  if(['dropdown','radio','checkbox'].includes(type)) base.options=['Option 1','Option 2'];
  if(type==='rating') base.max=5;
  if(type==='heading') base.label='Section Title';
  if(type==='description') base.label='Add helpful instructions here for participants.';
  return base;
}

function renderDynamicFieldHtml(f){
  const reqMark = f.required ? `<span class="req">*</span>` : '';
  const help = f.help ? `<div class="hint">${escapeHtml(f.help)}</div>` : '';
  switch(f.type){
    case 'heading': return `<div class="form-field"><h3 style="margin-bottom:2px">${escapeHtml(f.label)}</h3>${help}</div>`;
    case 'description': return `<div class="form-field"><p style="color:var(--ink-soft)">${escapeHtml(f.label)}</p></div>`;
    case 'divider': return `<hr style="border:none;border-top:1px solid var(--gold-dim);margin:22px 0">`;
    case 'long_text': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><textarea name="${f.id}" placeholder="${escapeHtml(f.placeholder||'')}" ${f.required?'required':''}></textarea>${help}</div>`;
    case 'dropdown': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><select name="${f.id}" ${f.required?'required':''}><option value="">Select...</option>${(f.options||[]).map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}</select>${help}</div>`;
    case 'radio': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label>${(f.options||[]).map((o,i)=>`<div class="radio-row"><input type="radio" id="${f.id}_${i}" name="${f.id}" value="${escapeHtml(o)}" ${f.required?'required':''}><label for="${f.id}_${i}" style="margin:0;font-weight:400">${escapeHtml(o)}</label></div>`).join('')}${help}</div>`;
    case 'checkbox': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label>${(f.options||[]).map((o,i)=>`<div class="checkbox-row"><input type="checkbox" id="${f.id}_${i}" name="${f.id}" value="${escapeHtml(o)}"><label for="${f.id}_${i}" style="margin:0;font-weight:400">${escapeHtml(o)}</label></div>`).join('')}${help}</div>`;
    case 'yesno': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><input type="hidden" name="${f.id}" ${f.required?'required':''}><div class="yn-row"><button type="button" class="yn-btn" data-val="Yes">Yes</button><button type="button" class="yn-btn" data-val="No">No</button></div>${help}</div>`;
    case 'rating': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><input type="hidden" name="${f.id}" ${f.required?'required':''}><div class="rating-row">${Array.from({length:f.max||5}).map((_,i)=>`<button type="button" class="rate-btn" data-val="${i+1}">${i+1}</button>`).join('')}</div>${help}</div>`;
    case 'file': return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><input type="file" name="${f.id}" ${f.required?'required':''}>${help}</div>`;
    default: { // short_text, email, phone, number, date, time
      const typeMap = {short_text:'text', email:'email', phone:'tel', number:'number', date:'date', time:'time'};
      return `<div class="form-field" data-fid="${f.id}"><label>${escapeHtml(f.label)} ${reqMark}</label><input type="${typeMap[f.type]||'text'}" name="${f.id}" placeholder="${escapeHtml(f.placeholder||'')}" ${f.required?'required':''}>${help}</div>`;
    }
  }
}
function renderDynamicFormHtml(schema){
  return (schema.fields||[]).map(renderDynamicFieldHtml).join('');
}
function attachDynamicFormInteractions(container){
  $$('.yn-btn',container).forEach(btn=>{
    btn.addEventListener('click',()=>{
      const wrap = btn.closest('.form-field');
      $$('.yn-btn',wrap).forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      wrap.querySelector('input[type=hidden]').value = btn.dataset.val;
    });
  });
  $$('.rate-btn',container).forEach(btn=>{
    btn.addEventListener('click',()=>{
      const wrap = btn.closest('.form-field');
      const val = +btn.dataset.val;
      $$('.rate-btn',wrap).forEach(b=>b.classList.toggle('sel', +b.dataset.val<=val));
      wrap.querySelector('input[type=hidden]').value = val;
    });
  });
}
async function collectDynamicFormData(formEl, schema){
  const data = {};
  const fd = new FormData(formEl);
  for(const f of (schema.fields||[])){
    if(['heading','description','divider'].includes(f.type)) continue;
    if(f.type==='checkbox'){ data[f.id] = fd.getAll(f.id); }
    else if(f.type==='file'){
      const file = formEl.querySelector(`[name="${f.id}"]`).files[0];
      if(file){ data[f.id] = await uploadFile(file, 'registrations'); }
      else data[f.id] = '';
    }
    else { data[f.id] = fd.get(f.id) || ''; }
  }
  return data;
}

/* Load & render the registration form linked to an event/tournament, handle submit */
async function attachRegistrationForm(kind, itemId){
  const panel = $('#reg-panel');
  if(!panel) return;
  try{
    const forms = await fetchAll('forms');
    const formDoc = forms.find(f=>f.linkedTo && f.linkedTo.type===kind.slice(0,-1) && f.linkedTo.id===itemId && f.status==='published');
    if(!formDoc){
      panel.innerHTML = `<h3>Registration</h3><p>The registration form for this ${kind==='events'?'event':'tournament'} is not published yet. Please check back soon.</p>`;
      return;
    }
    panel.innerHTML = `<h3>${escapeHtml(formDoc.title||'Register Now')}</h3>
      <form id="reg-dyn-form">${renderDynamicFormHtml(formDoc)}
      <button class="btn btn-gold" type="submit" style="width:100%;justify-content:center">Submit Registration</button></form>`;
    attachDynamicFormInteractions(panel);
    $('#reg-dyn-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Submitting...';
      try{
        const data = await collectDynamicFormData(e.target, formDoc);
        const regId = 'REG-'+Date.now().toString(36).toUpperCase();
        await addItem('registrations', { formId: formDoc.id, linkedType: kind.slice(0,-1), linkedId: itemId, regId, data, status:'pending' });
        panel.innerHTML = `<h3>Registration Received!</h3><p>Your registration ID is:</p><p style="font-family:var(--font-display);font-size:1.4rem;color:var(--maroon)">${regId}</p><p>Please save this ID for reference. Our team will review and confirm your registration.</p>`;
        toast('Registration submitted successfully!','success');
      }catch(err){
        toast('Submission failed: '+err.message,'error');
        btn.disabled=false; btn.textContent='Submit Registration';
      }
    });
  }catch(err){
    panel.innerHTML = emptyState('Could not load registration form: '+err.message);
  }
}
</script>

<script>
/* =========================================================================
   GENERIC ADMIN CRUD ENGINE (used for Branches, Coaches, Courses, Achievements, Students)
   ========================================================================= */
const ENTITY_CONFIGS = {
  branches: { title:'Branches', singular:'Branch', collection:'branches', section:'branches', image:true, imageField:'imageUrl', imageLabel:'Branch Photo',
    fields:[
      {name:'name',label:'Branch Name',type:'text',required:true},
      {name:'status',label:'Status',type:'select',options:['open','closed']},
      {name:'address',label:'Address',type:'textarea'},
      {name:'phone',label:'Phone',type:'text'},
      {name:'instructor',label:'Instructor',type:'text'},
      {name:'timing',label:'Timing',type:'text'},
      {name:'mapUrl',label:'Google Maps URL',type:'text'}
    ]},
  coaches: { title:'Coaches', singular:'Coach', collection:'coaches', section:'coaches', image:true, imageField:'photoUrl', imageLabel:'Coach Photo',
    fields:[
      {name:'name',label:'Full Name',type:'text',required:true},
      {name:'rank',label:'Rank / Belt',type:'text'},
      {name:'experience',label:'Experience',type:'text'},
      {name:'bio',label:'Biography',type:'textarea'}
    ]},
  courses: { title:'Courses', singular:'Course', collection:'courses', section:'courses', image:false,
    fields:[
      {name:'name',label:'Course Name',type:'text',required:true},
      {name:'description',label:'Description',type:'textarea'},
      {name:'duration',label:'Duration',type:'text'},
      {name:'fee',label:'Fee',type:'text'},
      {name:'ageLimit',label:'Age Limit',type:'text'},
      {name:'schedule',label:'Schedule',type:'text'},
      {name:'requirements',label:'Requirements',type:'textarea'}
    ]},

    fields:[
      {name:'studentName',label:'Student Name',type:'text',required:true},
      {name:'title',label:'Achievement Title',type:'text',required:true},
      {name:'level',label:'Level',type:'select',options:['national','state','international']},
      {name:'medal',label:'Medal',type:'select',options:['gold','silver','bronze','participation']},

    fields:[

      {name:'joinedDate',label:'Joined Date',type:'text'}

};
const adminCache = {};

function buildEntityFieldsHtml(fields, item){
  return fields.map(f=>{
    const val = item[f.name]!==undefined ? item[f.name] : '';
    if(f.type==='textarea') return `<div class="form-field"><label>${f.label}${f.required?' <span class="req">*</span>':''}</label><textarea name="${f.name}" ${f.required?'required':''}>${escapeHtml(val)}</textarea></div>`;
    if(f.type==='select') return `<div class="form-field"><label>${f.label}</label><select name="${f.name}">${f.options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
    return `<div class="form-field"><label>${f.label}${f.required?' <span class="req">*</span>':''}</label><input type="text" name="${f.name}" value="${escapeHtml(val)}" ${f.required?'required':''}></div>`;
  }).join('');
}
function openEntityModal(entityKey, item){
  const cfg = ENTITY_CONFIGS[entityKey];
  const isEdit = !!item;
  item = item || {};
  openModal(`
    <h3>${isEdit?'Edit':'Add'} ${cfg.singular}</h3>
    <form id="entity-form">
      ${buildEntityFieldsHtml(cfg.fields, item)}
      ${cfg.image?`<div class="form-field"><label>${cfg.imageLabel}</label><input type="file" name="__image" accept="image/*">
        ${item[cfg.imageField]?`<img src="${item[cfg.imageField]}" style="width:70px;margin-top:8px;border-radius:4px">`:''}</div>`:''}
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">

        <button type="submit" class="btn btn-maroon btn-sm">${isEdit?'Save Changes':'Add'}</button>
      </div>
    </form>`);
  $('#entity-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    cfg.fields.forEach(f=> data[f.name] = fd.get(f.name) || '');
    const submitBtn = e.target.querySelector('button[type=submit]');
    submitBtn.disabled = true; submitBtn.textContent = 'Saving...';
    try{
      if(cfg.image){
        const file = fd.get('__image');
        if(file && file.size>0){ data[cfg.imageField] = await uploadFile(file, entityKey); }
        else if(isEdit) data[cfg.imageField] = item[cfg.imageField]||'';
      }
      if(isEdit) await updateItem(cfg.collection, item.id, data);
      else await addItem(cfg.collection, data);
      closeModal();
      toast(isEdit?'Updated!':'Added!','success');
      route();
    }catch(err){ toast('Save failed: '+err.message,'error'); submitBtn.disabled=false; submitBtn.textContent='Save'; }
  });
}
function entityListHtml(entityKey, items){
  const cfg = ENTITY_CONFIGS[entityKey];
  const cols = cfg.fields.slice(0,4);
  return `
  <div class="admin-topbar"><h2 style="margin:0">${cfg.title}</h2><button class="btn btn-maroon btn-sm" id="add-entity-btn">+ Add ${cfg.singular}</button></div>
  <div class="panel">
    ${items.length?`<table class="admin-table"><thead><tr>${cfg.image?'<th>Photo</th>':''}${cols.map(f=>`<th>${f.label}</th>`).join('')}<th>Actions</th></tr></thead>
    <tbody>${items.map(it=>`<tr>
      ${cfg.image?`<td><img src="${it[cfg.imageField]||placeholderImg()}" style="width:44px;height:44px;object-fit:cover;border-radius:4px"></td>`:''}
      ${cols.map(f=> f.type==='select' ? `<td><span class="badge ${it[f.name]==='closed'?'closed':'open'}">${escapeHtml(it[f.name]||'')}</span></td>` : `<td>${escapeHtml(it[f.name]||'')}</td>`).join('')}
      <td class="row-actions"><button data-edit="${it.id}">Edit</button><button data-del="${it.id}">Delete</button></td>
    </tr>`).join('')}</tbody></table>`
    : emptyState('No entries yet. Click "Add '+cfg.singular+'" to create the first one.')}
  </div>`;
}
function attachEntityCrud(entityKey){
  const items = adminCache[entityKey] || [];
  $('#add-entity-btn')?.addEventListener('click',()=>openEntityModal(entityKey));
  $$('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEntityModal(entityKey, items.find(i=>i.id===b.dataset.edit))));
  $$('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    confirmAction('Delete this entry permanently?', async ()=>{
      try{
        const cfg = ENTITY_CONFIGS[entityKey];
        const item = items.find(i=>i.id===b.dataset.del);
        if(cfg.image && item && item[cfg.imageField]) await deleteFileByUrl(item[cfg.imageField]);
        await deleteItem(cfg.collection, b.dataset.del);
        toast('Deleted','success'); route();
      }catch(err){ toast('Delete failed: '+err.message,'error'); }
    });
  }));
}
async function adminBranches(){ const items = await fetchAll('branches'); adminCache.branches = items; return entityListHtml('branches', items); }
function attachAdminBranches(){ attachEntityCrud('branches'); }

   ADMIN: REGISTRATIONS (for events & tournaments)
   ========================================================================= */
/* =========================================================================
   ADMIN: REGISTRATIONS (for events & tournaments) — with filter + CSV export
   ========================================================================= */
async function adminRegistrations(){
  const [regs, events, tournaments, forms] = await Promise.all([
    fetchAll('registrations',{orderField:'createdAt',orderDir:'desc'}), fetchAll('events'), fetchAll('tournaments'), fetchAll('forms')
  ]);
  adminCache.registrations = regs;
  adminCache.regFormsIndex = forms;
  const allItems = [
    ...events.map(e=>({key:`event:${e.id}`, label:`[Event] ${e.title}`})),
    ...tournaments.map(t=>({key:`tournament:${t.id}`, label:`[Tournament] ${t.title}`}))
  ];
  const nameOf = (r)=>{
    const list = r.linkedType==='event'?events:tournaments;
    const it = list.find(x=>x.id===r.linkedId);
    return it ? it.title : '(deleted item)';
  };
  if(!state.regFilter) state.regFilter = 'all';
  const filtered = state.regFilter==='all' ? regs : regs.filter(r=>`${r.linkedType}:${r.linkedId}`===state.regFilter);

  return `
  <div class="admin-topbar">
    <h2 style="margin:0">Registrations (${filtered.length}${state.regFilter!=='all'?` of ${regs.length}`:''})</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="reg-filter" style="padding:9px 12px;border:1px solid #c9bfa4;border-radius:4px;font-family:var(--font-ui)">
        <option value="all" ${state.regFilter==='all'?'selected':''}>All Events &amp; Tournaments</option>
        ${allItems.map(i=>`<option value="${i.key}" ${state.regFilter===i.key?'selected':''}>${escapeHtml(i.label)}</option>`).join('')}
      </select>
      <button class="btn btn-maroon btn-sm" id="export-csv-btn">Export CSV</button>
      <button class="btn btn-outline btn-sm" id="export-xlsx-btn">Export Excel (.xlsx)</button>
    </div>
  </div>
  <div class="panel">
    ${filtered.length? `<table class="admin-table"><thead><tr><th>Reg ID</th><th>For</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${filtered.map(r=>`<tr>
        <td>${escapeHtml(r.regId)}</td><td>${escapeHtml(nameOf(r))}</td><td>${escapeHtml(r.linkedType)}</td>
        <td><span class="badge ${r.status==='approved'?'published':r.status==='rejected'?'closed':'draft'}">${escapeHtml(r.status)}</span></td>
        <td class="row-actions">
          <button data-view="${r.id}">View</button>
          <button data-approve="${r.id}">Approve</button>
          <button data-reject="${r.id}">Reject</button>
        </td></tr>`).join('')}</tbody></table>`
      : emptyState(regs.length ? 'No registrations match this filter.' : 'No registrations received yet.')}
  </div>`;
}

function csvEscape(val){
  if(val===undefined||val===null) return '';
  const s = Array.isArray(val) ? val.join('; ') : String(val);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function attachAdminRegistrations(){
  const regs = adminCache.registrations||[];
  const forms = adminCache.regFormsIndex||[];

  $('#reg-filter').addEventListener('change', (e)=>{
    state.regFilter = e.target.value;
    route();
  });

  $('#export-csv-btn').addEventListener('click', ()=>{
    const filtered = state.regFilter==='all' ? regs : regs.filter(r=>`${r.linkedType}:${r.linkedId}`===state.regFilter);
    if(!filtered.length){ toast('Nothing to export for this filter.','error'); return; }

    let csv, filename;
    if(state.regFilter!=='all'){
      const form = forms.find(f=>f.id===filtered[0].formId);
      const fields = (form?.fields||[]).filter(f=>!['heading','description','divider'].includes(f.type));
      const headers = ['Registration ID','Status','Submitted At', ...fields.map(f=>f.label)];
      const rows = filtered.map(r=>{
        const base = [r.regId, r.status, fmtDate(r.createdAt)];
        const answers = fields.map(f=> r.data ? r.data[f.id] : '');
        return [...base, ...answers];
      });
      csv = [headers, ...rows].map(row=>row.map(csvEscape).join(',')).join('\n');
      filename = `registrations_${state.regFilter.replace(':','_')}.csv`;
    } else {
      const headers = ['Registration ID','For','Type','Status','Submitted At','Answers'];
      const rows = filtered.map(r=>{
        const form = forms.find(f=>f.id===r.formId);
        const fieldMap = {};
        (form?.fields||[]).forEach(f=>{ fieldMap[f.id]=f.label; });
        const answers = Object.entries(r.data||{}).map(([k,v])=>`${fieldMap[k]||k}: ${Array.isArray(v)?v.join('/'):v}`).join(' | ');
        return [r.regId, r.linkedId, r.linkedType, r.status, fmtDate(r.createdAt), answers];
      });
      csv = [headers, ...rows].map(row=>row.map(csvEscape).join(',')).join('\n');
      filename = 'registrations_all.csv';
    }

    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('CSV exported!','success');
  });

  $('#export-xlsx-btn').addEventListener('click', ()=>{
    const filtered = state.regFilter==='all' ? regs : regs.filter(r=>`${r.linkedType}:${r.linkedId}`===state.regFilter);
    if(!filtered.length){ toast('Nothing to export for this filter.','error'); return; }

    const wb = XLSX.utils.book_new();

    if(state.regFilter!=='all'){
      // Single event/tournament: one sheet, real columns per form field
      const form = forms.find(f=>f.id===filtered[0].formId);
      const fields = (form?.fields||[]).filter(f=>!['heading','description','divider'].includes(f.type));
      const headerRow = ['Registration ID','Status','Submitted At', ...fields.map(f=>f.label)];
      const dataRows = filtered.map(r=>{
        const base = [r.regId, r.status, fmtDate(r.createdAt)];
        const answers = fields.map(f=>{
          const v = r.data ? r.data[f.id] : '';
          return Array.isArray(v) ? v.join(', ') : (v ?? '');
        });
        return [...base, ...answers];
      });
      const ws = XLSX.utils.aoa_to_sheet([headerRow, ...dataRows]);
      ws['!cols'] = headerRow.map(h => ({ wch: Math.max(12, h.length + 2) }));
      XLSX.utils.book_append_sheet(wb, ws, 'Registrations');
    } else {
      // All events/tournaments: one sheet per item, plus a combined summary sheet
      const grouped = {};
      filtered.forEach(r=>{
        const key = `${r.linkedType}:${r.linkedId}`;
        (grouped[key] = grouped[key] || []).push(r);
      });
      const summaryRows = [['Registration ID','For','Type','Status','Submitted At']];

      Object.entries(grouped).forEach(([key, group])=>{
        const form = forms.find(f=>f.id===group[0].formId);
        const fields = (form?.fields||[]).filter(f=>!['heading','description','divider'].includes(f.type));
        const headerRow = ['Registration ID','Status','Submitted At', ...fields.map(f=>f.label)];
        const dataRows = group.map(r=>{
          const base = [r.regId, r.status, fmtDate(r.createdAt)];
          const answers = fields.map(f=>{
            const v = r.data ? r.data[f.id] : '';
            return Array.isArray(v) ? v.join(', ') : (v ?? '');
          });
          summaryRows.push([r.regId, key.split(':')[1], r.linkedType, r.status, fmtDate(r.createdAt)]);
          return [...base, ...answers];
        });
        const ws = XLSX.utils.aoa_to_sheet([headerRow, ...dataRows]);
        ws['!cols'] = headerRow.map(h => ({ wch: Math.max(12, h.length + 2) }));
        // Sheet names can't exceed 31 chars or contain : \ / ? * [ ]
        const safeName = key.replace(/[:\\/?*\[\]]/g, '_').slice(0, 31) || 'Sheet';
        XLSX.utils.book_append_sheet(wb, ws, safeName);
      });

      const summaryWs = XLSX.utils.aoa_to_sheet(summaryRows);
      XLSX.utils.book_append_sheet(wb, summaryWs, 'All Registrations');
    }

    const filename = state.regFilter==='all'
      ? 'registrations_all.xlsx'
      : `registrations_${state.regFilter.replace(':','_')}.xlsx`;
    XLSX.writeFile(wb, filename);
    toast('Excel file exported!','success');
  });

  $$('[data-view]').forEach(b=>b.addEventListener('click',()=>{
    const r = regs.find(x=>x.id===b.dataset.view);
    const rows = Object.entries(r.data||{}).map(([k,v])=>`<tr><td style="font-weight:600">${escapeHtml(k)}</td><td>${Array.isArray(v)?escapeHtml(v.join(', ')):(typeof v==='string' && v.startsWith('http'))?`<a href="${v}" target="_blank">View File</a>`:escapeHtml(v)}</td></tr>`).join('');
    openModal(`<h3>Registration ${escapeHtml(r.regId)}</h3><table class="admin-table"><tbody>${rows}</tbody></table>
      <div style="text-align:right;margin-top:16px"><button class="btn btn-ghost btn-sm" data-close>Close</button></div>`);
  }));
  $$('[data-approve]').forEach(b=>b.addEventListener('click', async ()=>{
    await updateItem('registrations', b.dataset.approve, {status:'approved'}); toast('Approved','success'); route();
  }));
  $$('[data-reject]').forEach(b=>b.addEventListener('click', async ()=>{
    await updateItem('registrations', b.dataset.reject, {status:'rejected'}); toast('Rejected'); route();
  }));
}
</script>
<script>
/* =========================================================================
   ADMIN: EVENTS & TOURNAMENTS (with banner upload, status, and — for
   tournaments — a Medal Tally / Results editor)
   ========================================================================= */
function eventFormFieldsHtml(item, isTournament){
  return `
    <div class="form-field"><label>Title <span class="req">*</span></label><input type="text" name="title" value="${escapeHtml(item.title)}" required></div>
    <div class="form-field"><label>Description</label><textarea name="description">${escapeHtml(item.description)}</textarea></div>
    <div class="form-field"><label>Category</label><input type="text" name="category" value="${escapeHtml(item.category)}"></div>
    ${isTournament?`
    <div class="form-field"><label>Age Group</label><input type="text" name="ageGroup" value="${escapeHtml(item.ageGroup)}" placeholder="e.g. U-12, U-18, Open"></div>
    <div class="form-field"><label>Gender Category</label><input type="text" name="gender" value="${escapeHtml(item.gender)}" placeholder="e.g. Boys, Girls, Mixed"></div>
    <div class="form-field"><label>Belt / Division</label><input type="text" name="belt" value="${escapeHtml(item.belt)}"></div>`:''}
    <div class="form-field"><label>Venue</label><input type="text" name="venue" value="${escapeHtml(item.venue)}"></div>
    <div class="form-field"><label>Date</label><input type="date" name="date" value="${escapeHtml(item.date)}"></div>
    <div class="form-field"><label>Registration Deadline</label><input type="date" name="registrationDeadline" value="${escapeHtml(item.registrationDeadline)}"></div>
    <div class="form-field"><label>Maximum Participants</label><input type="number" name="maxParticipants" value="${escapeHtml(item.maxParticipants)}"></div>
    <div class="form-field"><label>Status</label><select name="status">
      ${['upcoming','live','completed'].map(s=>`<option value="${s}" ${item.status===s?'selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="form-field"><label>Banner Image</label><input type="file" name="__image" accept="image/*">
      ${item.bannerUrl?`<img src="${item.bannerUrl}" style="width:100px;margin-top:8px;border-radius:4px">`:''}</div>`;
}
function openEventModal(kind, item){ // kind: 'events' | 'tournaments'
  const isTournament = kind==='tournaments';
  const isEdit = !!item; item = item||{};
  openModal(`
    <h3>${isEdit?'Edit':'Add'} ${isTournament?'Tournament':'Event'}</h3>
    <form id="event-form">${eventFormFieldsHtml(item,isTournament)}
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
        <button type="button" class="btn btn-ghost btn-sm" data-close>Cancel</button>
        <button type="submit" class="btn btn-maroon btn-sm">${isEdit?'Save Changes':'Add'}</button>
      </div>
    </form>`);
  $('#event-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    ['title','description','category','ageGroup','gender','belt','venue','date','registrationDeadline','maxParticipants','status'].forEach(k=>{
      if(fd.has(k)) data[k]=fd.get(k);
    });
    const btn = e.target.querySelector('button[type=submit]'); btn.disabled=true; btn.textContent='Saving...';
    try{
      const file = fd.get('__image');
      if(file && file.size>0) data.bannerUrl = await uploadFile(file, kind);
      else if(isEdit) data.bannerUrl = item.bannerUrl || '';
      if(isTournament && !isEdit) data.medalTally = [];
      if(isEdit) await updateItem(kind, item.id, data);
      else await addItem(kind, data);
      closeModal(); toast(isEdit?'Updated!':'Added!','success'); route();
    }catch(err){ toast('Save failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Save'; }
  });
}
function eventsTableHtml(kind, items){
  const isTournament = kind==='tournaments';
  return `
  <div class="admin-topbar"><h2 style="margin:0">${isTournament?'Tournaments':'Events'}</h2><button class="btn btn-maroon btn-sm" id="add-event-btn">+ Add ${isTournament?'Tournament':'Event'}</button></div>
  <div class="panel">
    ${items.length?`<table class="admin-table"><thead><tr><th>Title</th><th>Date</th><th>Venue</th><th>Status</th><th>Form</th><th>Actions</th></tr></thead>
    <tbody>${items.map(it=>`<tr>
      <td>${escapeHtml(it.title)}</td><td>${fmtDate(it.date)}</td><td>${escapeHtml(it.venue||'-')}</td>
      <td><span class="badge ${it.status==='completed'?'closed':'open'}">${escapeHtml(it.status||'upcoming')}</span></td>
      <td><a href="#/admin/formbuilder/${isTournament?'tournament':'event'}/${it.id}" class="btn btn-sm btn-ghost">Design Form</a></td>
      <td class="row-actions">
        <button data-edit="${it.id}">Edit</button>
        ${isTournament?`<button data-results="${it.id}">Results</button>`:''}
        <button data-view="${it.id}">View</button>
        <button data-del="${it.id}">Delete</button>
      </td>
    </tr>`).join('')}</tbody></table>`
    : emptyState(`No ${isTournament?'tournaments':'events'} yet. Click "Add" to create the first one.`)}
  </div>`;
}
async function adminEvents(){ const items = await fetchAll('events',{orderField:'date',orderDir:'desc'}); adminCache.events = items; return eventsTableHtml('events', items); }
async function adminTournaments(){ const items = await fetchAll('tournaments',{orderField:'date',orderDir:'desc'}); adminCache.tournaments = items; return eventsTableHtml('tournaments', items); }

function attachAdminEventsOrTournaments(kind){
  const items = adminCache[kind] || [];
  $('#add-event-btn')?.addEventListener('click',()=>openEventModal(kind));
  $$('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEventModal(kind, items.find(i=>i.id===b.dataset.edit))));
  $$('[data-view]').forEach(b=>b.addEventListener('click',()=>{ location.hash = `#/${kind}/${b.dataset.view}`; }));
  $$('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    confirmAction('Delete this permanently? Any linked registration form will remain but become unlinked.', async ()=>{
      try{
        const item = items.find(i=>i.id===b.dataset.del);
        if(item && item.bannerUrl) await deleteFileByUrl(item.bannerUrl);
        await deleteItem(kind, b.dataset.del);
        toast('Deleted','success'); route();
      }catch(err){ toast('Delete failed: '+err.message,'error'); }
    });
  }));
  if(kind==='tournaments'){
    $$('[data-results]').forEach(b=>b.addEventListener('click',()=>openResultsModal(items.find(i=>i.id===b.dataset.results))));
  }
}
function openResultsModal(t){
  const rows = t.medalTally||[];
  const renderRows = ()=> rows.map((m,i)=>`<tr><td>${escapeHtml(m.student)}</td><td>${escapeHtml(m.category||'-')}</td><td>${escapeHtml(m.medal)}</td><td><button data-rmrow="${i}" class="btn-sm btn-ghost btn">Remove</button></td></tr>`).join('');
  openModal(`
    <h3>Results — ${escapeHtml(t.title)}</h3>
    <table class="admin-table" id="results-table"><thead><tr><th>Student</th><th>Category</th><th>Medal</th><th></th></tr></thead><tbody>${renderRows()}</tbody></table>
    <div class="ornament-divider">${kolamSvg()}</div>
    <form id="add-result-form" style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end">
      <div class="form-field" style="margin:0"><label>Student</label><input type="text" name="student" required></div>
      <div class="form-field" style="margin:0"><label>Category</label><input type="text" name="category"></div>
      <div class="form-field" style="margin:0"><label>Medal</label><select name="medal"><option>gold</option><option>silver</option><option>bronze</option></select></div>
      <button class="btn btn-maroon btn-sm" type="submit">Add</button>
    </form>
    <div style="text-align:right;margin-top:18px"><button class="btn btn-ghost btn-sm" data-close>Close</button></div>
  `);
  $('#add-result-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    rows.push(fd);
    await updateItem('tournaments', t.id, {medalTally: rows});
    openResultsModal({...t, medalTally: rows});
    toast('Result added','success');
  });
  $$('[data-rmrow]').forEach(btn=>btn.addEventListener('click', async ()=>{
    rows.splice(+btn.dataset.rmrow,1);
    await updateItem('tournaments', t.id, {medalTally: rows});
    openResultsModal({...t, medalTally: rows});
  }));
}
</script>
<script>
/* =========================================================================
   ADMIN: FORM BUILDER (Google-Forms-style visual designer)
   ========================================================================= */
let fbState = { formId:null, schema:{title:'',fields:[],linkedTo:null,status:'draft'}, selectedFieldId:null, linkedItemTitle:'' };

async function adminFormBuilder(sub){
  if(!sub) return emptyState('No event or tournament selected. Go to Events or Tournaments and click "Design Form".');
  const [type,id] = sub.split('/');
  const collectionName = type==='tournament' ? 'tournaments' : 'events';
  const linkedItem = await fetchOne(collectionName, id);
  const forms = await fetchAll('forms');
  const existing = forms.find(f=>f.linkedTo && f.linkedTo.type===type && f.linkedTo.id===id);
  if(existing){
    fbState = { formId: existing.id, schema: existing, selectedFieldId: existing.fields?.[0]?.id || null, linkedItemTitle: linkedItem?.title||'' };
  } else {
    fbState = { formId:null, schema:{title:`Registration — ${linkedItem?.title||''}`, fields:[], linkedTo:{type,id}, status:'draft'}, selectedFieldId:null, linkedItemTitle: linkedItem?.title||'' };
  }
  return `<div id="fb-root">${renderFormBuilderInner()}</div>`;
}

function renderFormBuilderInner(){
  const s = fbState.schema;
  const selected = s.fields.find(f=>f.id===fbState.selectedFieldId);
  return `
  <div class="admin-topbar">
    <div><h2 style="margin:0">Form Builder</h2><div style="font-size:.85rem;color:var(--ink-soft)">Linked to: ${escapeHtml(fbState.linkedItemTitle)}</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="badge ${s.status==='published'?'published':'draft'}">${s.status}</span>
      <button class="btn btn-ghost btn-sm" id="fb-preview-btn">Preview</button>
      <button class="btn btn-ghost btn-sm" id="fb-save-draft">Save Draft</button>
      <button class="btn btn-maroon btn-sm" id="fb-publish">${s.status==='published'?'Update & Keep Published':'Publish'}</button>
    </div>
  </div>
  <div class="panel">
    <div class="form-field" style="max-width:420px;margin:0"><label>Form Title</label><input type="text" id="fb-title" value="${escapeHtml(s.title)}"></div>
  </div>
  <div class="fb-shell">
    <div class="fb-palette panel">
      <h3 style="margin-top:0;font-size:1rem">Add Field</h3>
      ${FIELD_TYPES.map(t=>`<button data-add="${t.type}">+ ${t.label}</button>`).join('')}
    </div>
    <div class="fb-canvas panel">
      <h3 style="margin-top:0;font-size:1rem">Form Fields (${s.fields.length})</h3>
      ${s.fields.length ? s.fields.map((f,i)=>`
        <div class="fb-field ${f.id===fbState.selectedFieldId?'active':''}" data-select="${f.id}">
          <div class="fb-field-top">
            <span class="fb-type">${FIELD_TYPES.find(t=>t.type===f.type)?.label||f.type}</span>
            <div class="fb-ctrls">
              <button data-up="${f.id}" title="Move up" ${i===0?'disabled':''}>&uarr;</button>
              <button data-down="${f.id}" title="Move down" ${i===s.fields.length-1?'disabled':''}>&darr;</button>
              <button data-dup="${f.id}" title="Duplicate">&#10064;</button>
              <button data-remove="${f.id}" title="Delete">&times;</button>
            </div>
          </div>
          <div style="pointer-events:none;opacity:.9">${renderDynamicFieldHtml(f)}</div>
        </div>`).join('') : `<div class="fb-empty">No fields yet. Add fields from the palette on the left to start designing this registration form.</div>`}
    </div>
    <div class="fb-props">
      <h3 style="margin-top:0;font-size:1rem">Field Properties</h3>
      ${selected ? renderFieldPropsHtml(selected) : `<p style="color:var(--ink-soft);font-size:.88rem">Select a field on the canvas to edit its properties.</p>`}
    </div>
  </div>`;
}
function renderFieldPropsHtml(f){
  const isChoice = ['dropdown','radio','checkbox'].includes(f.type);
  const noReq = ['heading','description','divider'].includes(f.type);
  return `
  <div class="form-field"><label>${f.type==='heading'?'Section Title':(f.type==='description'?'Paragraph Text':'Label')}</label>
    <input type="text" id="prop-label" value="${escapeHtml(f.label)}"></div>
  ${!noReq?`
  <div class="form-field"><label>Help Text</label><input type="text" id="prop-help" value="${escapeHtml(f.help||'')}"></div>
  <div class="form-field"><label><input type="checkbox" id="prop-required" ${f.required?'checked':''}> Required field</label></div>
  ${['short_text','long_text','email','phone','number'].includes(f.type)?`<div class="form-field"><label>Placeholder</label><input type="text" id="prop-placeholder" value="${escapeHtml(f.placeholder||'')}"></div>`:''}
  ${isChoice?`<div class="form-field"><label>Options (one per line)</label><textarea id="prop-options" rows="5">${escapeHtml((f.options||[]).join('\n'))}</textarea></div>`:''}
  ${f.type==='rating'?`<div class="form-field"><label>Max Rating</label><input type="number" id="prop-max" value="${f.max||5}" min="2" max="10"></div>`:''}
  `:''}
  <button class="btn btn-sm btn-maroon" id="prop-apply" style="width:100%;justify-content:center">Apply Changes</button>`;
}

function rerenderFB(){ $('#fb-root').innerHTML = renderFormBuilderInner(); bindFormBuilderEvents(); }

function attachFormBuilder(sub){
  if(!sub) return;
  bindFormBuilderEvents();
}
function bindFormBuilderEvents(){
  $('#fb-title')?.addEventListener('change', e=>{ fbState.schema.title = e.target.value; });
  $$('[data-add]').forEach(b=>b.addEventListener('click',()=>{
    const f = defaultFieldForType(b.dataset.add);
    fbState.schema.fields.push(f);
    fbState.selectedFieldId = f.id;
    rerenderFB();
  }));
  $$('[data-select]').forEach(el=>el.addEventListener('click',(e)=>{
    if(e.target.closest('.fb-ctrls')) return;
    fbState.selectedFieldId = el.dataset.select; rerenderFB();
  }));
  $$('[data-up]').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); moveField(b.dataset.up,-1); }));
  $$('[data-down]').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); moveField(b.dataset.down,1); }));
  $$('[data-dup]').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); duplicateField(b.dataset.dup); }));
  $$('[data-remove]').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); removeField(b.dataset.remove); }));
  $('#prop-apply')?.addEventListener('click',applyFieldProps);
  $('#fb-save-draft')?.addEventListener('click',()=>saveForm('draft'));
  $('#fb-publish')?.addEventListener('click',()=>saveForm('published'));
  $('#fb-preview-btn')?.addEventListener('click',()=>{
    openModal(`<h3>${escapeHtml(fbState.schema.title)}</h3><form id="fb-preview-form">${renderDynamicFormHtml(fbState.schema)}</form>
      <div style="text-align:right;margin-top:14px"><button class="btn btn-ghost btn-sm" data-close>Close Preview</button></div>`);
    attachDynamicFormInteractions($('#modal-root'));
  });
}
function moveField(id,dir){
  const f = fbState.schema.fields;
  const i = f.findIndex(x=>x.id===id);
  const j = i+dir;
  if(j<0||j>=f.length) return;
  [f[i],f[j]] = [f[j],f[i]];
  rerenderFB();
}
function duplicateField(id){
  const f = fbState.schema.fields;
  const i = f.findIndex(x=>x.id===id);
  const clone = JSON.parse(JSON.stringify(f[i]));
  clone.id = uid();
  f.splice(i+1,0,clone);
  fbState.selectedFieldId = clone.id;
  rerenderFB();
}
function removeField(id){
  fbState.schema.fields = fbState.schema.fields.filter(x=>x.id!==id);
  if(fbState.selectedFieldId===id) fbState.selectedFieldId = null;
  rerenderFB();
}
function applyFieldProps(){
  const f = fbState.schema.fields.find(x=>x.id===fbState.selectedFieldId);
  if(!f) return;
  f.label = $('#prop-label').value;
  if($('#prop-help')) f.help = $('#prop-help').value;
  if($('#prop-required')) f.required = $('#prop-required').checked;
  if($('#prop-placeholder')) f.placeholder = $('#prop-placeholder').value;
  if($('#prop-options')) f.options = $('#prop-options').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if($('#prop-max')) f.max = +$('#prop-max').value;
  rerenderFB();
  toast('Field updated');
}
async function saveForm(status){
  fbState.schema.status = status;
  try{
    if(fbState.formId){ await updateItem('forms', fbState.formId, fbState.schema); }
    else { fbState.formId = await addItem('forms', fbState.schema); }
    toast(status==='published' ? 'Form published! It is now live on the public page.' : 'Draft saved.', 'success');
    rerenderFB();
  }catch(err){ toast('Save failed: '+err.message,'error'); }
}
</script>
<script>
/* =========================================================================
   BOOTSTRAP
   ========================================================================= */
auth.onAuthStateChanged(async (user)=>{
  state.user = user;
  await checkAdminStatus();
  route();
});
(async function init(){
  await loadSiteConfig();
  await route();
})();
</script>
